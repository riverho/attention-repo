name: "E-ATTN-CLI-01 pipeline"

on:
  pull_request:
    paths:
      - "scripts/attention"
      - '!MAP.md'
  push:
    branches: [main]
    paths:
      - "scripts/attention"
      - '!MAP.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify entity file exists
        run: |
          test -f "scripts/attention" || {
            echo "ERROR: E-ATTN-CLI-01 file scripts/attention not found"
            exit 1
          }

      - name: Run Python tests
        run: |
          python3 -m unittest discover -s tests -p "test_*.py"

      - name: Run Node tests
        run: |
          npm install --silent
          node tests/test_package_contract.js
          node tests/test_bun_cli.js
          node tests/test_mcp_integration.js
