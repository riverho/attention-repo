name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      engine: ${{ steps.filter.outputs.engine }}
      resolve: ${{ steps.filter.outputs.resolve }}
      state: ${{ steps.filter.outputs.state }}
      version: ${{ steps.filter.outputs.version }}
      bin: ${{ steps.filter.outputs.bin }}
      src-local: ${{ steps.filter.outputs.src-local }}
      src-reg: ${{ steps.filter.outputs.src-reg }}
      mcp-index: ${{ steps.filter.outputs.mcp-index }}
      mcp-tools: ${{ steps.filter.outputs.mcp-tools }}
      mcp-bridge: ${{ steps.filter.outputs.mcp-bridge }}
      test-gate: ${{ steps.filter.outputs.test-gate }}
      test-drift: ${{ steps.filter.outputs.test-drift }}
      test-audit: ${{ steps.filter.outputs.test-audit }}
      test-cli: ${{ steps.filter.outputs.test-cli }}
      test-mcp: ${{ steps.filter.outputs.test-mcp }}
      test-pkg: ${{ steps.filter.outputs.test-pkg }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cli:
              - 'scripts/attention'
            engine:
              - 'scripts/jit-context.py'
            resolve:
              - 'scripts/resolve.py'
            state:
              - 'scripts/attention-state.py'
            version:
              - 'scripts/version_info.py'
            bin:
              - 'bin/**'
            src-local:
              - 'src/cli/**'
            src-reg:
              - 'src/package/**'
            mcp-index:
              - 'mcp-server/index.js'
            mcp-tools:
              - 'mcp-server/src/**'
            mcp-bridge:
              - 'mcp-server/src/python-bridge.js'
            test-gate:
              - 'tests/test_gate_effectiveness.py'
            test-drift:
              - 'tests/test_drift_detection.py'
            test-audit:
              - 'tests/test_audit_chain.py'
            test-cli:
              - 'tests/test_bun_cli.js'
            test-mcp:
              - 'tests/test_mcp_integration.js'
            test-pkg:
              - 'tests/test_package_contract.js'

  shared-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify scripts are executable
        run: |
          test -x scripts/attention
          test -x scripts/jit-context.py
      - name: Run Python tests
        run: |
          python3 -m unittest discover -s tests -p "test_*.py"
      - name: Install Node dependencies
        run: npm ci --silent
      - name: Run Node tests
        run: |
          node tests/test_package_contract.js
          node tests/test_bun_cli.js
          node tests/test_mcp_integration.js

  entity-cli:
    needs: [changes, shared-tests]
    uses: ./.github/workflows/E-ATTN-CLI-01.yml
    if: needs.changes.outputs.cli == 'true'

  entity-engine:
    needs: [changes, shared-tests]
    uses: ./.github/workflows/E-ATTN-ENGINE-01.yml
    if: needs.changes.outputs.engine == 'true'

  entity-resolve:
    needs: [changes, shared-tests]
    uses: ./.github/workflows/E-ATTN-RESOLVE-01.yml
    if: needs.changes.outputs.resolve == 'true'

  entity-state:
    needs: [changes, shared-tests]
    uses: ./.github/workflows/E-ATTN-STATE-01.yml
    if: needs.changes.outputs.state == 'true'

  entity-version:
    needs: [changes, shared-tests]
    uses: ./.github/workflows/E-ATTN-VERSION-01.yml
    if: needs.changes.outputs.version == 'true'

  entity-bin:
    needs: [changes, shared-tests]
    uses: ./.github/workflows/E-ATTN-BIN-01.yml
    if: needs.changes.outputs.bin == 'true'

  entity-src-local:
    needs: [changes, shared-tests]
    uses: ./.github/workflows/E-ATTN-SRC-LOCAL-01.yml
    if: needs.changes.outputs.src-local == 'true'

  entity-src-reg:
    needs: [changes, shared-tests]
    uses: ./.github/workflows/E-ATTN-SRC-REG-01.yml
    if: needs.changes.outputs.src-reg == 'true'

  entity-mcp-index:
    needs: [changes, shared-tests]
    uses: ./.github/workflows/E-ATTN-MCP-INDEX-01.yml
    if: needs.changes.outputs.mcp-index == 'true'

  entity-mcp-tools:
    needs: [changes, shared-tests]
    uses: ./.github/workflows/E-ATTN-MCP-TOOLS-01.yml
    if: needs.changes.outputs.mcp-tools == 'true'

  entity-mcp-bridge:
    needs: [changes, shared-tests]
    uses: ./.github/workflows/E-ATTN-MCP-BRIDGE-01.yml
    if: needs.changes.outputs.mcp-bridge == 'true'

  entity-test-gate:
    needs: [changes, shared-tests]
    uses: ./.github/workflows/E-ATTN-TEST-GATE-01.yml
    if: needs.changes.outputs.test-gate == 'true'

  entity-test-drift:
    needs: [changes, shared-tests]
    uses: ./.github/workflows/E-ATTN-TEST-DRIFT-01.yml
    if: needs.changes.outputs.test-drift == 'true'

  entity-test-audit:
    needs: [changes, shared-tests]
    uses: ./.github/workflows/E-ATTN-TEST-AUDIT-01.yml
    if: needs.changes.outputs.test-audit == 'true'

  entity-test-cli:
    needs: [changes, shared-tests]
    uses: ./.github/workflows/E-ATTN-TEST-CLI-01.yml
    if: needs.changes.outputs.test-cli == 'true'

  entity-test-mcp:
    needs: [changes, shared-tests]
    uses: ./.github/workflows/E-ATTN-TEST-MCP-01.yml
    if: needs.changes.outputs.test-mcp == 'true'

  entity-test-pkg:
    needs: [changes, shared-tests]
    uses: ./.github/workflows/E-ATTN-TEST-PKG-01.yml
    if: needs.changes.outputs.test-pkg == 'true'
